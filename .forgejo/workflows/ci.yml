name: CI

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/stormj-uh/jonerix:builder-amd64

    steps:
      - name: Checkout
        shell: sh
        env:
          TOKEN: ${{ secrets.FORGEJO_API_TOKEN }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -eu

          cd "${GITHUB_WORKSPACE}"
          curl -fsSL -H "Authorization: token ${TOKEN}" \
            "${SERVER}/${REPO}/archive/${SHA}.tar.gz" |
            tar xz --strip-components=1

      - name: Test
        shell: sh
        run: cargo test --locked

      - name: Build release
        shell: sh
        run: cargo build --release --locked
